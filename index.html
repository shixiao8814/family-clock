<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我们的时光 | 家庭时钟</title>
  <script>
    function getBeijingHour() {
      const now = new Date();
      const beijingTime = new Date(now.getTime() + (now.getTimezoneOffset() + 8) * 60 * 1000);
      return beijingTime.getHours();
    }

    const hour = getBeijingHour();
    
    // 白天：樱花版，晚上：壁炉版
    if (hour >= 6 && hour < 18) {
      window.location.href = 'index-v1-sakura.html';
    } else {
      window.location.href = 'index-v4-cozy.html';
    }
  </script>
</head>
<body>
  <p style="text-align:center;padding-top:100px;font-family:sans-serif;">正在加载...</p>
</body>
</html>
