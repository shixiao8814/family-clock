<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我们的时光 | 家庭时钟 - 温暖壁炉版</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: 'Noto Serif SC', serif;
      background: #2d2520;
      color: #f5e6d3;
      overflow: hidden;
    }

    /* 壁炉效果 */
    .fireplace {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 40vh;
      background: linear-gradient(0deg, #3d2e25 0%, #1a1512 100%);
      overflow: hidden;
    }

    .fire {
      position: absolute;
      bottom: 10%;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 200px;
    }

    .flame {
      position: absolute;
      bottom: 0;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      animation: flicker 0.5s ease-in-out infinite alternate;
    }

    .flame-1 {
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 100px;
      background: linear-gradient(0deg, #ff6b35 0%, #f7c531 50%, #fff3b0 100%);
      animation-delay: 0s;
    }

    .flame-2 {
      left: 30%;
      width: 40px;
      height: 70px;
      background: linear-gradient(0deg, #ff6b35 0%, #ff8c42 100%);
      animation-delay: 0.1s;
    }

    .flame-3 {
      left: 60%;
      width: 45px;
      height: 80px;
      background: linear-gradient(0deg, #ff6b35 0%, #ff8c42 100%);
      animation-delay: 0.2s;
    }

    @keyframes flicker {
      0% { transform: translateX(-50%) scaleY(1) scaleX(1); }
      100% { transform: translateX(-50%) scaleY(1.1) scaleX(0.95); }
    }

    .flame-2, .flame-3 {
      animation-name: flicker-side;
    }

    @keyframes flicker-side {
      0% { transform: scaleY(1) scaleX(1); }
      100% { transform: scaleY(1.15) scaleX(0.9); }
    }

    /* 木柴 */
    .logs {
      position: absolute;
      bottom: 5%;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 5px;
    }

    .log {
      width: 80px;
      height: 20px;
      background: linear-gradient(90deg, #4a3728 0%, #5d4635 50%, #4a3728 100%);
      border-radius: 3px;
    }

    .log:nth-child(2) {
      width: 60px;
      transform: rotate(-5deg);
    }

    /* 星星 */
    .stars {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 70vh;
    }

    .star {
      position: absolute;
      width: 3px;
      height: 3px;
      background: #f5e6d3;
      border-radius: 50%;
      animation: twinkle 2s ease-in-out infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    /* 主容器 */
    .container {
      position: relative;
      z-index: 1;
      max-width: 1000px;
      margin: 0 auto;
      padding: 50px 24px 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .page-title {
      font-family: 'ZCOOL KuaiLe', cursive;
      font-size: 2.5rem;
      color: #f5e6d3;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
      margin-bottom: 8px;
    }

    .page-subtitle {
      font-size: 0.9rem;
      color: #c9b8a3;
      margin-bottom: 40px;
      letter-spacing: 0.3em;
    }

    .clocks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px;
      width: 100%;
    }

    .clock-card {
      flex: 1;
      background: rgba(45, 37, 32, 0.8);
      border-radius: 20px;
      padding: 28px;
      border: 1px solid rgba(245, 230, 211, 0.1);
      backdrop-filter: blur(10px);
      transition: all 0.4s ease;
    }

    .clock-card:hover {
      background: rgba(45, 37, 32, 0.95);
      border-color: rgba(245, 230, 211, 0.2);
      transform: translateY(-5px);
    }

    .card-icon {
      font-size: 2rem;
      margin-bottom: 15px;
    }

    .card-title {
      font-family: 'ZCOOL KuaiLe', cursive;
      font-size: 1.8rem;
      margin-bottom: 5px;
    }

    .card-start {
      font-size: 0.8rem;
      color: #a89880;
      margin-bottom: 20px;
    }

    .card-subtitle {
      font-size: 0.75rem;
      color: #c9b8a3;
      margin-bottom: 20px;
      letter-spacing: 0.1em;
    }

    .time-display {
      display: flex;
      gap: 10px;
    }

    .time-unit {
      flex: 1;
      text-align: center;
      padding: 14px 8px;
      background: rgba(245, 230, 211, 0.05);
      border-radius: 12px;
      border: 1px solid rgba(245, 230, 211, 0.1);
    }

    .time-value {
      font-size: 1.6rem;
      font-weight: 600;
      display: block;
      color: #f7c531;
    }

    .time-label {
      font-size: 0.65rem;
      color: #a89880;
      margin-top: 5px;
    }

    .footer-note {
      margin-top: 40px;
      text-align: center;
      font-size: 0.8rem;
      color: #8a7a65;
    }

    @media (max-width: 768px) {
      .clocks-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <!-- 星空 -->
  <div class="stars" id="stars"></div>

  <!-- 壁炉 -->
  <div class="fireplace">
    <div class="fire">
      <div class="flame flame-1"></div>
      <div class="flame flame-2"></div>
      <div class="flame flame-3"></div>
    </div>
    <div class="logs">
      <div class="log"></div>
      <div class="log"></div>
    </div>
  </div>

  <div class="container">
    <h1 class="page-title">我们的时光</h1>
    <p class="page-subtitle">温暖 · 舒适</p>

    <div class="clocks-grid">
      <!-- 大宝 -->
      <div class="clock-card">
        <div class="card-icon">💕</div>
        <h2 class="card-title">大宝</h2>
        <p class="card-start">2014.02.24</p>
        <p class="card-subtitle">相伴每一天</p>
        <div class="time-display">
          <div class="time-unit">
            <span class="time-value" id="lover-years">0</span>
            <span class="time-label">年</span>
          </div>
          <div class="time-unit">
            <span class="time-value" id="lover-months">0</span>
            <span class="time-label">月</span>
          </div>
          <div class="time-unit">
            <span class="time-value" id="lover-days">0</span>
            <span class="time-label">天</span>
          </div>
        </div>
      </div>

      <!-- 小宝 -->
      <div class="clock-card">
        <div class="card-icon">👶</div>
        <h2 class="card-title">小宝</h2>
        <p class="card-start">2024.08.06</p>
        <p class="card-subtitle">小可爱到来</p>
        <div class="time-display">
          <div class="time-unit">
            <span class="time-value" id="baby-years">0</span>
            <span class="time-label">年</span>
          </div>
          <div class="time-unit">
            <span class="time-value" id="baby-months">0</span>
            <span class="time-label">月</span>
          </div>
          <div class="time-unit">
            <span class="time-value" id="baby-days">0</span>
            <span class="time-label">天</span>
          </div>
        </div>
      </div>

      <!-- 小崽 -->
      <div class="clock-card">
        <div class="card-icon">🤰</div>
        <h2 class="card-title">小崽</h2>
        <p class="card-start">预产期 2026.07.09</p>
        <p class="card-subtitle">即将见面</p>
        <div class="time-display">
          <div class="time-unit">
            <span class="time-value" id="pregnant-days">0</span>
            <span class="time-label">天后</span>
          </div>
          <div class="time-unit">
            <span class="time-value" id="pregnant-weeks">0</span>
            <span class="time-label">周</span>
          </div>
          <div class="time-unit">
            <span class="time-value" id="pregnant-months">0</span>
            <span class="time-label">月</span>
          </div>
        </div>
      </div>

      <!-- 奶牛猫 -->
      <div class="clock-card">
        <div class="card-icon">🐈‍⬛</div>
        <h2 class="card-title">奶牛</h2>
        <p class="card-start">2019.07.19</p>
        <p class="card-subtitle">陪伴了我们</p>
        <div class="time-display">
          <div class="time-unit">
            <span class="time-value" id="cat1-years">0</span>
            <span class="time-label">年</span>
          </div>
          <div class="time-unit">
            <span class="time-value" id="cat1-months">0</span>
            <span class="time-label">月</span>
          </div>
          <div class="time-unit">
            <span class="time-value" id="cat1-days">0</span>
            <span class="time-label">天</span>
          </div>
        </div>
      </div>

      <!-- 雀猫 -->
      <div class="clock-card">
        <div class="card-icon">🐱</div>
        <h2 class="card-title">雀猫</h2>
        <p class="card-start">2023.05.23</p>
        <p class="card-subtitle">陪伴了我们</p>
        <div class="time-display">
          <div class="time-unit">
            <span class="time-value" id="cat2-years">0</span>
            <span class="time-label">年</span>
          </div>
          <div class="time-unit">
            <span class="time-value" id="cat2-months">0</span>
            <span class="time-label">月</span>
          </div>
          <div class="time-unit">
            <span class="time-value" id="cat2-days">0</span>
            <span class="time-label">天</span>
          </div>
        </div>
      </div>
    </div>

    <p class="footer-note">温馨小家 ❤️</p>
  </div>

  <script>
    // 生成星星
    const starsContainer = document.getElementById('stars');
    for (let i = 0; i < 50; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.animationDelay = Math.random() * 2 + 's';
      starsContainer.appendChild(star);
    }

    function parseDate(str) {
      const [year, month, day] = str.split('.').map(Number);
      return new Date(year, month - 1, day);
    }

    function getDiff(startDate, endDate) {
      let years = endDate.getFullYear() - startDate.getFullYear();
      let months = endDate.getMonth() - startDate.getMonth();
      let days = endDate.getDate() - startDate.getDate();

      if (days < 0) {
        months--;
        const prevMonth = new Date(endDate.getFullYear(), endDate.getMonth(), 0);
        days += prevMonth.getDate();
      }

      if (months < 0) {
        years--;
        months += 12;
      }

      return { years, months, days };
    }

    function getCountdown(targetDate) {
      const now = new Date();
      const diff = targetDate - now;
      
      if (diff <= 0) {
        return { days: 0, weeks: 0, months: 0 };
      }
      
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const weeks = Math.floor(days / 7);
      const months = Math.floor(days / 30);
      
      return { days, weeks, months };
    }

    function updateClocks() {
      const now = new Date();
      
      // 大宝
      const loverStart = parseDate('2014.02.24');
      const diff1 = getDiff(loverStart, now);
      document.getElementById('lover-years').textContent = diff1.years;
      document.getElementById('lover-months').textContent = diff1.months;
      document.getElementById('lover-days').textContent = diff1.days;
      
      // 小宝
      const babyStart = parseDate('2024.08.06');
      const diff2 = getDiff(babyStart, now);
      document.getElementById('baby-years').textContent = diff2.years;
      document.getElementById('baby-months').textContent = diff2.months;
      document.getElementById('baby-days').textContent = diff2.days;
      
      // 小崽
      const dueDate = parseDate('2026.07.09');
      const countdown = getCountdown(dueDate);
      document.getElementById('pregnant-days').textContent = countdown.days;
      document.getElementById('pregnant-weeks').textContent = countdown.weeks;
      document.getElementById('pregnant-months').textContent = countdown.months;
      
      // 奶牛猫
      const cat1Start = parseDate('2019.07.19');
      const diff3 = getDiff(cat1Start, now);
      document.getElementById('cat1-years').textContent = diff3.years;
      document.getElementById('cat1-months').textContent = diff3.months;
      document.getElementById('cat1-days').textContent = diff3.days;
      
      // 雀猫
      const cat2Start = parseDate('2023.05.23');
      const diff4 = getDiff(cat2Start, now);
      document.getElementById('cat2-years').textContent = diff4.years;
      document.getElementById('cat2-months').textContent = diff4.months;
      document.getElementById('cat2-days').textContent = diff4.days;
    }

    updateClocks();
    setInterval(updateClocks, 1000);
  </script>
</body>
</html>
